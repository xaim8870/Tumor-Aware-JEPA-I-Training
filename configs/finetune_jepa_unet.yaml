# configs/finetune_jepa_unet.yaml

project_name: "JEPA Encoder + U-Net Decoder Brain Tumor Segmentation"

data:
  data_root: "D:/Brain Tumor Segmentation/data/processed/brisc_segformer_binary"

  train_images: "images/train"
  train_masks: "masks/train"

  val_images: "images/val"
  val_masks: "masks/val"

  img_size: 256
  in_channels: 1
  mask_threshold: 0

model:
  img_size: 256
  patch_size: 16
  in_channels: 1
  embed_dim: 192
  encoder_depth: 4
  num_heads: 3
  mlp_ratio: 4.0
  dropout: 0.0

  decoder_channels: [128, 64, 32, 16]

pretrained:
  encoder_checkpoint: "outputs/pretrain_jepa/checkpoints/final_jepa_encoder_100ep.pth"

training:
  seed: 42
  epochs: 100
  batch_size: 4
  num_workers: 2

  encoder_lr: 0.00001
  decoder_lr: 0.0001
  weight_decay: 0.0001

  freeze_encoder_epochs: 5

  loss_bce_weight: 1.0
  loss_dice_weight: 1.0

  threshold: 0.5
  use_amp: true
  grad_clip: 1.0

output:
  out_dir: "outputs/finetune_jepa_unet"